# @package _global_
# Ablation 2c — temporal padding + linear lifting combined
# Interaction effect of both fixes applied simultaneously.
# temporal_pad: 5 (paper-style zero-padding) + lifting_channel_ratio: 0 (single Linear(4→64))

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: data-kol
    name: re500-2c-pad-and-lift

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T64_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 2
  T: 64
  time_scale: 1.0
  temporal_pad: 5

model:
  lifting_channel_ratio: 0

opt:
  learning_rate: 1e-3
  weight_decay: 0.0
  milestones: [200, 400]
  gamma: 0.5
