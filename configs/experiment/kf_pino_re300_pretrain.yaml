# @package _global_
# PINO pretraining on Re=300 Kolmogorov flow — Table 8 source operator.
# Matches paper-pino configs/pretrain/Re300-pretrain-1s.yaml.
#
# Architecture aligned with fine-tuning ablation (4a_allfixes):
#   lifting_channel_ratio=0  (single linear fc0, matches paper)
#   hidden_channels=128      (matches fine-tune warm-start target)

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: pretrain-kol
    name: 1_pino-re300-pretrain

trainer:
  max_epochs: 150
  check_val_every_n_epoch: 5

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re300_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

loss:
  re: 300
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25, 50, 75, 100]
  gamma: 0.5

model:
  lifting_channel_ratio: 0   # single linear lift (paper fc0); matches 4a_allfixes fine-tune
  hidden_channels: 128       # matches 4a_allfixes fine-tune architecture for warm-start
