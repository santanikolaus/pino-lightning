# @package _global_
# Run 1A: Data-only FNO at 61×61 resolution, 300 epochs
# Tests resolution + epoch fix only (minimal change from data-only baseline)

defaults:
  - override /data: darcy_binary
  - override /loss: data_only

data:
  encode_input: false
  encode_output: false
  train_resolution: 61

model:
  domain_padding: 0.0

trainer:
  max_epochs: 300

logger:
  wandb:
    project: darcy_dataonly_binary
    name: run1a_res61_epochs300
