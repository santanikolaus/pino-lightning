# @package _global_
# Ablation 3d — increased spectral capacity via hidden_channels=128.
# Paper's SpectralConv3d uses 4 quadrant weight tensors per layer vs neuralop's 1,
# giving 4x more spectral params at hidden=64. Doubling to hidden=128 matches that
# capacity exactly: 128^2 * 8^3 = 4 * 64^2 * 8^3 = 1,048,576 params/layer.
# Base: kf_scratch_re500_pde_only (PDE+IC from scratch, Re=500, instance 295)

defaults:
  - override /callbacks: kf

callbacks:
  kf_visualizer:
    log_every_n_epochs: 500

logger:
  wandb:
    project: finetune-kol
    name: null
    run_prefix: "3d_hidden128"

trainer:
  max_epochs: 8000

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 1
  n_val: 1
  batch_size: 1
  sub_t: 2
  num_workers: 0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 0.0
  pde_weight: 1.0
  ic_weight: 5.0

opt:
  learning_rate: 0.0025
  weight_decay: 0.0
  milestones: [1000, 2000, 3000, 4000, 5000, 6000, 7000]
  gamma: 0.5

model:
  hidden_channels: 128

instance:
  start: 295
  stop: 296
