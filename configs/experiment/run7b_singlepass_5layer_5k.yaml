# @package _global_
# Run 7b — single-pass PINO, 5-layer FNO, paper loss ratio, 5000 epochs
#
# Same single-pass setup as run7a but with two additions:
#   1. n_layers=5 — extra spectral block (run5d showed +6pp at modes=20 dual-pass;
#      depth benefit likely stronger in single-pass where gradient conflict is absent)
#   2. data_weight=5.0, pde_weight=1.0 — paper's loss ratio (5:1) instead of
#      run3a/7a's 10:1. Stronger PDE signal may accelerate residual reduction.
#
# Paper PINO target: val_61=1.56%

defaults:
  - override /data: darcy_binary
  - override /loss: pino

data:
  encode_input: false
  encode_output: false
  input_coord_channels: true
  pde_resolution: 61

model:
  data_channels: 3
  n_modes: [20, 20]
  n_layers: 5
  domain_padding: 0.0
  lifting_channel_ratio: 0
  positional_embedding: null

loss:
  dual_data_pass: false
  data_weight: 5.0
  pde_weight: 1.0

opt:
  milestones: [1000, 2000, 3000]

trainer:
  max_epochs: 5000

logger:
  wandb:
    project: lowres64-binary-paper
    name: run7b_singlepass_5layer_5k
