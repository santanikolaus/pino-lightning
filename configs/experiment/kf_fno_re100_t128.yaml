# @package _global_

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: data-kol
    name: fno-re100-t128-128x128

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re100_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  T: 64        # effective steps after sub_t=2: (128+1-1)//2 = 64 → 65 frames
  time_scale: 1.0

loss:
  re: 100
  t_interval: 1.0
  data_weight: 1.0
  pde_weight: 0.0

opt:
  learning_rate: 2e-3
  weight_decay: 0.0
  milestones: [200, 400]
  gamma: 0.5
