# @package _global_
# Run 5b — warm-start from run2c (modes=5 data-only, val_61=6.88%) + PDE fine-tune
#
# Direct analog of paper-pino C in our codebase:
#   paper-pino C: load Run A checkpoint (val_61=8.88%) → fine-tune with PDE loss
#   run 5b:       load run2c checkpoint (val_61=6.88%) → fine-tune with PDE loss
#
# Architecture kept identical to run2c (modes=5, n_layers=4) so state_dict loads cleanly.
# LR restarted at 1e-4 (10× lower than run2c's 1e-3) to avoid disrupting learned weights.
#
# Paper PINO targets: val_11=5.23%, val_61=1.56%, val_211=1.58%

defaults:
  - override /data: darcy_binary
  - override /loss: pino

warm_start_ckpt: /system/user/studentwork/wehofer/pino-lightning/pino-darcy-paper/lowres64-binary-paper/z2agf0c1/checkpoints/best_val61.ckpt

data:
  encode_input: false
  encode_output: false
  input_coord_channels: true
  pde_resolution: 61

model:
  data_channels: 3
  n_modes: [5, 5]
  domain_padding: 0.0
  lifting_channel_ratio: 0
  positional_embedding: null

loss:
  dual_data_pass: true
  data_weight: 5.0
  pde_weight: 1.0

opt:
  learning_rate: 1e-4
  milestones: [100, 200, 300]

trainer:
  max_epochs: 300

logger:
  wandb:
    project: lowres64-binary-paper
    name: run5b_warmstart_modes5_pde
