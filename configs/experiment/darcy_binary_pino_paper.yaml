# @package _global_
# PINO paper §4.1 Table 1: train@11, PDE@61, test@{11,61,211}
# Uses binary permeability a ∈ {3, 12} from the original paper

defaults:
  - override /data: darcy_binary
  - override /loss: pino

loss:
  pde_resolution: 61
  data_weight: 1.0
  pde_weight: 0.1

data:
  pde_resolution: ${loss.pde_resolution}

logger:
  wandb:
    name: darcy_binary_pino_paper_table1
