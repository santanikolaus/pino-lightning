# @package _global_
# Ablation 1a — T=65/IC-inclusion fix ONLY (config bugs reverted to broken state)
# Isolates the effect of the temporal alignment fix (T=target.shape[-1], y=target).
# domain_padding and positional_embedding are reverted to the pre-fix state.
# Paper comparison: broken GridEmbed (7ch lifting) + spatial padding (breaks periodicity).

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: data-kol
    name: re500-1a-T65only

trainer:
  max_epochs: 150

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 80
  n_val: 20
  batch_size: 1
  sub_t: 2
  T: 64        # unused by training loop (T derived from target), kept for reference
  time_scale: 1.0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 1.0
  pde_weight: 0.0

opt:
  learning_rate: 2e-3
  weight_decay: 0.0
  milestones: [100, 130]
  gamma: 0.5

model:
  domain_padding: 0.0625       # reverted: spatial padding (breaks KF periodicity)
  positional_embedding: "grid" # reverted: GridEmbeddingND double-counts coord channels
