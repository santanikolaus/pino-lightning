# @package _global_
# Run 1B: Data-only FNO at 61×61 with all paper-matching config changes
# Resolution 61, batch_size 20, 300 epochs, no channel MLP

defaults:
  - override /data: darcy_binary
  - override /loss: data_only

data:
  encode_input: false
  encode_output: false
  train_resolution: 61
  batch_size: 20

model:
  domain_padding: 0.0
  use_channel_mlp: false

trainer:
  max_epochs: 300

logger:
  wandb:
    project: darcy_dataonly_binary
    name: run1b_res61_full_config
