# @package _global_
# Run 8a sanity — sparse-input dense-grid, data-only, 50 epochs
#
# Sanity check before the full run8a PINO run.
# Success criterion: val_11 trends toward ~5% without crashes.
# Expected runtime: ~10 minutes on GPU.

defaults:
  - override /data: darcy_binary
  - override /loss: data_only

data:
  train_resolution: 61
  sparse_input_resolution: 11
  encode_input: false
  encode_output: false
  input_coord_channels: true

model:
  data_channels: 3
  n_modes: [5, 5]
  domain_padding: 0.0
  lifting_channel_ratio: 0
  positional_embedding: null

opt:
  milestones: [20, 35]
  gamma: 0.5

trainer:
  max_epochs: 50

logger:
  wandb:
    project: lowres64-binary-paper
    name: run8a_sanity_data_only
