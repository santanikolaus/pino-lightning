# @package _global_
# Run 7c — sequential gradient steps, single-pass at 61×61, 5000 epochs
#
# Two optimizer steps per batch:
#   Step 1: forward 61×61 → subsample → data loss → backward → step
#   Step 2: forward 61×61 → PDE loss → backward → step
#
# Hypothesis: sequential steps eliminate gradient conflict — data and PDE
# gradients never compete in the same update vector.
#
# Architecture and resolution identical to run7a (single-pass, modes=20).
# Loss ratio: data_weight=5.0, pde_weight=1.0 (paper's 5:1 ratio).
# 5000 epochs with MultiStepLR stabilising at ep3000.

defaults:
  - override /data: darcy_binary
  - override /loss: pino

data:
  encode_input: false
  encode_output: false
  input_coord_channels: true
  pde_resolution: 61

model:
  data_channels: 3
  n_modes: [20, 20]
  n_layers: 4
  domain_padding: 0.0
  lifting_channel_ratio: 0
  positional_embedding: null

loss:
  dual_data_pass: false
  sequential_steps: true
  data_weight: 5.0
  pde_weight: 1.0

opt:
  milestones: [1000, 2000, 3000]

trainer:
  max_epochs: 5000

logger:
  wandb:
    project: lowres64-binary-paper
    name: run7c_sequential_5k
