# @package _global_
# Ablation 1c — T=65/IC fix + domain_padding=0; GridEmbeddingND still broken.
# Isolates effect of removing spatial zero-padding (periodic BCs restored).
# Paper comparison: correct periodicity, but GridEmbed still injects duplicate coords.

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: data-kol
    name: re500-1c-T65-noDP

trainer:
  max_epochs: 150

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 80
  n_val: 20
  batch_size: 1
  sub_t: 2
  T: 64
  time_scale: 1.0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 1.0
  pde_weight: 0.0

opt:
  learning_rate: 2e-3
  weight_decay: 0.0
  milestones: [100, 130]
  gamma: 0.5

model:
  domain_padding: 0.0          # FIXED: no spatial padding
  positional_embedding: "grid" # reverted: GridEmbeddingND double-counts coord channels
