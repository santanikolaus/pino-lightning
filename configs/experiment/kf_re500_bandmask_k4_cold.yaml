# @package _global_
# Band-masked data loss sweep — k<=4, cold-start (comparison arm for k4 warm-start).
# Same loss as kf_re500_bandmask_k4 but no warm_start_ckpt: random init.
# 300 epochs to compensate for cold start (baseline pretrain was 150 epochs from scratch).
# Checkpoint selected on val_l2_band (k<=4).
# Comparison: k4_warm vs k4_cold isolates whether warm-start matters for band-masking
# (warm=fine-tunes representation, cold=shapes it from scratch with masked loss).

defaults:
  - override /callbacks: kf_bandmask

logger:
  wandb:
    project: bandmask-kol
    name: re500-bandmask-k4-cold

trainer:
  max_epochs: 300
  check_val_every_n_epoch: 5

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0
  band_mask_kmax: 4

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [50, 100, 150, 200, 250]
  gamma: 0.5

model:
  lifting_channel_ratio: 0
  hidden_channels: 128
