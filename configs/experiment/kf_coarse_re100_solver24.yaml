# @package _global_
# Coarse-solver experiment — Re=100 Kolmogorov flow.
# 5th input channel: free-running NS at 24^2, spectrally zero-padded to 128^2.
# Coarse file must be pre-materialized with scripts/materialize_coarse_solver.py.
# Compare against kf_coarse_re100_k7.yaml (oracle GT k<=7 as 5th channel).

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: pretrain-kol
    name: coarse-solver24-re100

trainer:
  max_epochs: 150

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re100_T128_part0.npy
  coarse_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re100_T128_res128_coarse_solver24_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

loss:
  re: 100
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25, 50, 75, 100]
  gamma: 0.5

model:
  data_channels: 5          # gridx, gridy, gridt, IC, coarse_solver24
  lifting_channel_ratio: 0
  hidden_channels: 128
