# @package _global_
# Ablation 1 — op300, n_modes=4
#
# Identical to kf_pino_re300_pretrain.yaml except n_modes=[4,4,4].
# Purpose: parametric anchor below the existing n_modes=8 baseline.
# If the mechanism is architectural, the signed-d onset should shift
# to k≈5 (first octave above the new cutoff), completing a 3-point
# parametric sweep at Re=300: n_modes=4 (onset≈5), 8 (onset≈9), 16 (onset≈17).
#
# Risk: n_modes=4 may be capacity-limited — watch val loss during training.
# If the model fails to converge, onset-tracking inference is still possible
# but the detector comparison will be confounded.
#
# Run on Titan V #3.

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: ablation_1
    name: op300-nmodes4-pino

trainer:
  max_epochs: 150
  check_val_every_n_epoch: 5

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re300_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

model:
  n_modes: [4, 4, 4]
  lifting_channel_ratio: 0
  hidden_channels: 128

loss:
  re: 300
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25, 50, 75, 100]
  gamma: 0.5
