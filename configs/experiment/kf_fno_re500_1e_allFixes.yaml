# @package _global_
# Ablation 1e — ALL fixes applied (T=65/IC + no GridEmbeddingND + no domain_padding).
# Expected to be closest to paper behavior for data-only FNO.
# Uses the current fno_kf.yaml defaults (domain_padding=0, positional_embedding=null).

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: data-kol
    name: re500-1e-allFixes

trainer:
  max_epochs: 150

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 80
  n_val: 20
  batch_size: 1
  sub_t: 2
  T: 64
  time_scale: 1.0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 1.0
  pde_weight: 0.0

opt:
  learning_rate: 2e-3
  weight_decay: 0.0
  milestones: [100, 130]
  gamma: 0.5
# model: no overrides — uses fno_kf.yaml defaults (domain_padding=0, positional_embedding=null)
