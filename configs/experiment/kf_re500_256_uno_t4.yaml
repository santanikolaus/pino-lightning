# @package _global_
# UNO arm to fit a 12 GB TITAN V (student09). TWO deltas vs the sub_t=2 reference
# (kf_re500_256_uno.yaml): data.sub_t 2->4 (T=32) AND lifting/projection 128->64.
# The lifting trim halves the ~1.1 GB C-independent intermediates (the last ~1 GB to clear
# 12 GB); near-zero param change (pointwise), stays ~20.8M.
# NOTE: this run differs from the t2 reference in BOTH sub_t and lifting — the comparison
#   shows their COMBINED effect, not sub_t alone (deliberate, to avoid restarting the P40).

defaults:
  - override /model: uno_kf
  - override /callbacks: kf

grad_checkpoint: true

model:
  lifting_channels: 64
  projection_channels: 64

logger:
  wandb:
    project: pathB-256
    name: re500-256-uno-t4

trainer:
  max_epochs: 150
  check_val_every_n_epoch: 5

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_res256_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 4
  num_workers: 0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25, 50, 75, 100]
  gamma: 0.5
