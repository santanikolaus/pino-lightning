# @package _global_
# From-scratch PDE+IC-only training for Re500 (Table 8 "From Scratch" column).
# Matches paper configs/scratch/Re500-scratch-1s.yaml:
#   paper: xy_loss=0, f_loss=1, ic_loss=5  (PDE+IC only, no data supervision)
#   ours:  data_weight=0, pde_weight=1, ic_weight=5

defaults:
  - override /callbacks: kf

callbacks:
  kf_visualizer:
    log_every_n_epochs: 500   # 16 images over 8000 epochs (was 50 → 160 images)

logger:
  wandb:
    project: finetune-kol
    name: null                # overridden per instance in train_kf_instance.py
    run_prefix: "2_scratch_pde_re500"

trainer:
  max_epochs: 8000            # n_train=1, batch=1 → 1 step/epoch → 8000 gradient steps total

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 1                  # single-instance mode; overridden per instance in loop
  n_val: 1
  batch_size: 1
  sub_t: 2                    # raw 129 frames → 65 effective frames (matches paper)
  num_workers: 0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 0.0
  pde_weight: 1.0
  ic_weight: 5.0

opt:
  learning_rate: 0.0025       # paper base_lr=0.0025
  weight_decay: 0.0
  milestones: [1000, 2000, 3000, 4000, 5000, 6000, 7000]   # paper milestones
  gamma: 0.5                  # 7 halvings: 0.0025 → ~1.95e-5 at step 7000

instance:
  start: 280                  # first test instance (our split: 0-239 train, 240-279 val, 280-299 test)
  stop: 285                  # exclusive; 20 test instances total

# model: inherits fno_kf.yaml defaults
#   hidden_channels: 64  (matches paper layers=[64,64,64,64,64])
#   n_modes: [8,8,8]     (matches paper modes=[8,8,8,8])
#   n_layers: 4
#   domain_padding: 0.0  (matches paper: no padding, preserves periodic BCs)
#   positional_embedding: null
