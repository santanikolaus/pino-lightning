# @package _global_
# Variant A chaining pilot — Re500 full-T, warm-started from pretrain.
# W1: full PINO loss; W2: chain data loss from predicted midpoint (no stopgrad).
# Eval: run chain_gate.py post-training for late k<=7 vs 0.571 wall.

defaults:
  - override /callbacks: kf

module_class: KFLitModuleChain

logger:
  wandb:
    project: chain-wall-pilot
    name: re500_chain_variantA_w1.0

trainer:
  max_epochs: 50
  check_val_every_n_epoch: 5

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0

chain:
  m: null        # -> T // 2 = 32
  weight: 1.0
  stop_grad: false

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25]
  gamma: 0.5

model:
  lifting_channel_ratio: 0
  hidden_channels: 128

warm_start_ckpt: /system/user/studentwork/wehofer/pino-lightning/pretrain-kol/38o0kj3y/checkpoints/best.ckpt
