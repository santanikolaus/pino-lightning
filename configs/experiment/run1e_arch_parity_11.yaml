# @package _global_
# Run 1e — Architecture parity: vertex-centered [a,x,y] coords + single linear lifting
# Hypothesis: explicit coordinate channels enable resolution generalization (val_61/211)
# Paper target (data-only binary): val_11=5.41%, val_61=9.01%, val_211=9.46%

defaults:
  - override /data: darcy_binary
  - override /loss: data_only

data:
  encode_input: false
  encode_output: false
  input_coord_channels: true

model:
  data_channels: 3
  domain_padding: 0.0
  lifting_channel_ratio: 0
  positional_embedding: null

trainer:
  max_epochs: 300

logger:
  wandb:
    project: lowres-binary-paper
    name: run1e_arch_parity_11
