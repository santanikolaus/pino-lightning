# @package _global_
# Band-isolation experiment: data loss restricted to shell k=3 only.
# k=3 sits below the forcing injection band (k=4), making it the cleanest
# test of whether the operator can learn a single smooth band.
# Cold-start, pde=0/ic=0: pure single-shell data signal.
# Checkpoint selected on val_l2_band (shell k=3).

defaults:
  - override /callbacks: kf_bandmask

logger:
  wandb:
    project: bandmask-kol
    name: re500-bandiso-k3

trainer:
  max_epochs: 300
  check_val_every_n_epoch: 5
  gradient_clip_val: 1.0

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 1.0
  pde_weight: 0.0
  ic_weight: 0.0
  band_iso_k_lo: 3
  band_iso_k_hi: 3

opt:
  learning_rate: 0.0005
  weight_decay: 0.0
  milestones: [50, 100, 150, 200, 250]
  gamma: 0.5

model:
  lifting_channel_ratio: 0
  hidden_channels: 128
