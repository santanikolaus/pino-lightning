# @package _global_
# Run 2b — Tier 1 + paper-style knobs (batch, optimizer, channel MLP off)
# Purpose: mirror the published config without changing architecture.

defaults:
  - override /data: darcy_binary
  - override /loss: data_only

data:
  train_resolution: 61
  test_resolutions: [11, 61, 211]
  encode_input: false
  encode_output: false
  input_coord_channels: true
  batch_size: 20

model:
  data_channels: 3
  domain_padding: 0.0
  positional_embedding: null
  lifting_channel_ratio: 0
  use_channel_mlp: false

loss:
  bc_mollifier: true
  mollifier_scale: 0.001

opt:
  weight_decay: 0.0

trainer:
  max_epochs: 300

logger:
  wandb:
    project: lowres64-binary-paper
    name: run2b_res61_paperknobs
