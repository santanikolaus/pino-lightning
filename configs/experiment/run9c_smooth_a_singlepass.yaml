# @package _global_
# Run 9c — single-pass PINO with Gaussian-smoothed permeability input (σ=1 pixel)
#
# Hypothesis: the binary permeability field a(x) ∈ {3, 12} has sharp 3/12 transitions
# that cause large FDM truncation error in the PDE loss (-div(a∇u)=1 via central
# differences), regardless of how accurate the model's prediction u is. This sets a
# structural floor on pde_loss_raw that prevents further convergence. Applying a
# Gaussian blur (σ=1 pixel) to a before loading softens those transitions, reduces FDM
# truncation error at interfaces, and should allow pde_loss_raw to descend lower.
#
# Design: smoothing is applied to both training and test a inputs. Labels y (ground-truth
# solutions from the original binary-a PDE) are not smoothed. This introduces a small
# irreducible error floor (model predicts u for smooth-a; labels are for binary-a), but
# it is negligible because Darcy solutions depend weakly on fine coefficient structure.
#
# Baseline: run7b — same architecture (single-pass, modes=20, 5 layers), binary a,
#   reached val_61=4.2% after 3268/5000 epochs.
# Target: val_61 < 4.0% within 1500 epochs → confirms hypothesis.

defaults:
  - override /data: darcy_binary
  - override /loss: pino

data:
  encode_input: false
  encode_output: false
  input_coord_channels: true
  train_resolution: 61
  pde_resolution: 61
  smooth_a_sigma: 1.0

model:
  data_channels: 3
  n_modes: [20, 20]
  n_layers: 5
  domain_padding: 0.0
  lifting_channel_ratio: 0
  positional_embedding: null

loss:
  dual_data_pass: false
  data_weight: 5.0
  pde_weight: 1.0

opt:
  milestones: [500, 1000]

trainer:
  max_epochs: 1500

logger:
  wandb:
    project: pino-baby
    name: run9c_smooth_a_singlepass
