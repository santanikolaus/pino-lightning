# @package _global_
# Run 1d — Paper-matched easy knobs: 11x11, no normalization
# Hypothesis: batch=20, no channel MLP, zero weight decay close the gap further
# Paper target (data-only binary): val_11=5.41%, val_61=9.01%, val_211=9.46%

defaults:
  - override /data: darcy_binary
  - override /loss: data_only

data:
  encode_input: false
  encode_output: false
  batch_size: 20

model:
  domain_padding: 0.0
  use_channel_mlp: false

opt:
  weight_decay: 0.0

logger:
  wandb:
    project: lowres-binary-paper
    name: run1d_paper_knobs_11
