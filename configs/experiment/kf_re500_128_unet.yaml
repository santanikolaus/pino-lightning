# @package _global_
# UNet 128² ablation base — Re500, base=64, depth=3 (~23.4M params).
# Bottleneck temporal-mixer sweep (none|spectral|conv|attn) to test the fix for
# the long-horizon energy collapse seen at 256². 128² fits a 12GB TITAN V WITHOUT
# gradient checkpointing; AMP fp16 (physics loss stays fp32 in KFLitModule).
# Directly comparable to the existing FNO re500 pretrain (same data/loss/opt).
# Per-arm: override model.temporal_mixer and logger.wandb.name on the CLI.

defaults:
  - override /model: unet_kf
  - override /callbacks: kf

grad_checkpoint: false   # top-level FNO-path flag; UNet uses model.grad_checkpoint

logger:
  wandb:
    project: unet-128-ablation
    name: re500-128-unet-none

trainer:
  max_epochs: 150
  check_val_every_n_epoch: 5
  precision: 16-mixed

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

model:
  base_channels: 64
  depth: 3
  grad_checkpoint: false   # 128² fits 12GB un-checkpointed → faster (no recompute)
  temporal_mixer: none     # sweep axis: none|spectral|conv|attn (CLI override per arm)

loss:
  re: 500
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25, 50, 75, 100]
  gamma: 0.5
