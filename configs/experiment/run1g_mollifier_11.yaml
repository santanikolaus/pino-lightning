# @package _global_
# Run 1g — BC mollifier (0.001 * sin(πx)sin(πy)) for data-only training
# Paper applies mollifier to ALL outputs, even without PDE loss
# Tests if mollifier fixes super-resolution collapse

defaults:
  - override /data: darcy_binary
  - override /loss: data_only

data:
  encode_input: false
  encode_output: false
  input_coord_channels: true

model:
  data_channels: 3
  domain_padding: 0.0
  lifting_channel_ratio: 0
  positional_embedding: null

loss:
  bc_mollifier: true
  mollifier_scale: 0.001

trainer:
  max_epochs: 300

logger:
  wandb:
    project: lowres-binary-paper
    name: run1g_mollifier_11
