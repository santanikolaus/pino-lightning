# @package _global_
# PINO pretraining on Re=500 Kolmogorov flow — Table 8 source operator.
# Matches paper-pino configs/pretrain/Re500-pretrain-1s.yaml.
# Note: this is population-level pretrain (data+PDE+IC), distinct from
# kf_scratch_re500_pde_only.yaml which is instance-wise fine-tuning.

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: pretrain-kol
    name: pino-re500-pretrain

trainer:
  max_epochs: 150

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25, 50, 75, 100]
  gamma: 0.5
