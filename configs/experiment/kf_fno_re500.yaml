# @package _global_

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: data-kolmogorov
    name: fno-re500-data-only

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T64_part0.npy
  n_train: 200       # paper Re500-1s-FNO.yaml: n_samples=200
  n_val: 60          # instances 200-259; test set = 260-299 (40 instances, Table 8 caption)
  batch_size: 2
  T: 64              # 64 time steps (65 frames including IC) — matches paper nt=64, sub_t=1
  time_scale: 1.0

opt:
  learning_rate: 1e-3
  weight_decay: 0.0
  milestones: [200, 400]  # paper configs/operator/Re500-1s-FNO.yaml: milestones:[200,400]
  gamma: 0.5
