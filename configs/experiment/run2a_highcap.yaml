# @package _global_
# Run 2a-highcap — Tier 1 settings + larger FNO capacity
# Goal: test whether widening/deepening neuralop FNO closes remaining gap.

defaults:
  - override /data: darcy_binary
  - override /loss: data_only

data:
  train_resolution: 61
  test_resolutions: [11, 61, 211]
  encode_input: false
  encode_output: false
  input_coord_channels: true

model:
  data_channels: 3
  domain_padding: 0.0
  positional_embedding: null
  lifting_channel_ratio: 0
  hidden_channels: 128
  n_layers: 6

loss:
  bc_mollifier: true
  mollifier_scale: 0.001

trainer:
  max_epochs: 300
  accelerator: gpu
  devices: [1]

logger:
  wandb:
    project: lowres64-binary-paper
    name: run2a_highcap
