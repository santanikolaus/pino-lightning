# @package _global_
# Run 1h — BC mollifier (paper scale=0.001) + hidden_channels=128
# Combines 1g (mollifier) and capacity increase to test if more spectral capacity
# sustains the early val_61 improvement the mollifier achieves at epoch 2-3

defaults:
  - override /data: darcy_binary
  - override /loss: data_only

data:
  encode_input: false
  encode_output: false
  input_coord_channels: true

model:
  data_channels: 3
  domain_padding: 0.0
  lifting_channel_ratio: 0
  positional_embedding: null
  hidden_channels: 128

loss:
  bc_mollifier: true
  mollifier_scale: 0.001

trainer:
  max_epochs: 300

logger:
  wandb:
    project: lowres-binary-paper
    name: run1h_mollifier_128ch
