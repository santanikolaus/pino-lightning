# @package _global_
# Context-frames experiment — Re=100, n_context=30 (high end of dose sweep).
# Baseline comparison: kf_pino_re100_pretrain.yaml (n_context=1).
# See kf_ctx_re100_n10.yaml for full design rationale.

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: pretrain-kol
    name: ctx-n30-re100

trainer:
  max_epochs: 150

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re100_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0
  n_context: 30

loss:
  re: 100
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25, 50, 75, 100]
  gamma: 0.5

model:
  data_channels: 4
  lifting_channel_ratio: 0
  hidden_channels: 128
