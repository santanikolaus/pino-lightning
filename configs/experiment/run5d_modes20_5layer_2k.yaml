# @package _global_
# Run 5d — dual pass, modes=20, **five** spectral blocks, MultiStepLR, 2000 epochs
#
# Purpose: isolate the effect of the paper's extra spectral block while keeping all
# other settings identical to run4a. Previous attempt (run4b) changed depth *and*
# lowered pde_weight, so depth benefits could not be measured. Here we keep
# pde_weight=1.0 and extend training to 2000 epochs to see whether the added
# capacity allows val_61/val_211 to keep descending past run4a's 21.8%.
#
# Key differences vs run4a:
#   • model.n_layers: 5  (paper depth, 5 spectral conv blocks)
#   • trainer.max_epochs: 2000  (gives twice the plateau time at LR=1.25e-4)
# All other hyperparameters (dual data pass, data/pde weights, modes=20, LR schedule)
# remain identical.

defaults:
  - override /data: darcy_binary
  - override /loss: pino

data:
  encode_input: false
  encode_output: false
  input_coord_channels: true
  pde_resolution: 61

model:
  data_channels: 3
  n_modes: [20, 20]
  n_layers: 5
  domain_padding: 0.0
  lifting_channel_ratio: 0
  positional_embedding: null

loss:
  dual_data_pass: true
  data_weight: 5.0
  pde_weight: 1.0

opt:
  milestones: [100, 200, 300]

trainer:
  max_epochs: 2000

logger:
  wandb:
    project: lowres64-binary-paper
    name: run5d_modes20_5layer_2k
