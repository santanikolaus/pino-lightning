# @package _global_
# RE200 cold instance fine-tune — Table 8 "From Scratch" entry.
# Mirrors kf_scratch_re500_4_allfixes.yaml exactly, RE500→RE200.
#   lifting_channel_ratio=0  (single linear fc0, matches paper)
#   hidden_channels=128      (4× spectral capacity, matches paper)
#
# Run 3 instances (285, 290, 295) as RE200 Table 8 sample.
# instance.start / instance.stop overridden per GPU on the command line.

defaults:
  - override /callbacks: kf

callbacks:
  kf_visualizer:
    log_every_n_epochs: 500

logger:
  wandb:
    project: finetune_kol_2
    name: null                # auto-set to {run_prefix}_i{instance_idx} by train_kf_instance.py
    run_prefix: "4a_allfixes_re200"

trainer:
  max_epochs: 8000            # 1 step/epoch (n_train=1, batch=1) → 8000 gradient steps

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re200_T128_part0.npy
  n_train: 1
  n_val: 1
  batch_size: 1
  sub_t: 2                    # 129 raw frames → 65 effective (matches paper Table 8)
  num_workers: 0

loss:
  re: 200
  t_interval: 1.0
  data_weight: 0.0
  pde_weight: 1.0
  ic_weight: 5.0

opt:
  learning_rate: 0.0025
  weight_decay: 0.0
  milestones: [1000, 2000, 3000, 4000, 5000, 6000, 7000]
  gamma: 0.5

model:
  lifting_channel_ratio: 0    # single linear lift (paper fc0)
  hidden_channels: 128        # 4× spectral capacity vs hidden=64 baseline

instance:
  start: 280
  stop: 300
