# @package _global_
# Band-masked data loss sweep — k<=5 arm.
# Hard-masks the supervised data term to Chebyshev k<=5 modes only.
# Warm-started from op500 pretrain (38o0kj3y). Checkpoint selected on val_l2_band (k<=5).
# Per-shell baseline late: k5=0.683, k6=0.806 — k=5 is one step past the forcing peak (k_y=4).
# GO criterion: band-matched late-k<=5 improves by >=0.03 vs baseline's late-k<=5.

defaults:
  - override /callbacks: kf_bandmask

logger:
  wandb:
    project: bandmask-kol
    name: re500-bandmask-k5

trainer:
  max_epochs: 150
  check_val_every_n_epoch: 5

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re500_T128_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

loss:
  re: 500
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0
  band_mask_kmax: 5

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25, 50, 75, 100]
  gamma: 0.5

model:
  lifting_channel_ratio: 0
  hidden_channels: 128

warm_start_ckpt: /system/user/studentwork/wehofer/pino-lightning/pretrain-kol/38o0kj3y/checkpoints/best.ckpt
