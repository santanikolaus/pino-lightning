# @package _global_
# Oracle coarse-trajectory experiment — Re=100 Kolmogorov flow.
# Adds a spectrally band-limited (k<=7) GT trajectory as a 5th input channel.
# All other settings match kf_pino_re100_pretrain.yaml exactly (single variable changed).
# Coarse file must be pre-materialized with scripts/materialize_coarse_k7.py.

defaults:
  - override /callbacks: kf

logger:
  wandb:
    project: pretrain-kol
    name: coarse-k7-re100

trainer:
  max_epochs: 150

data:
  data_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re100_T128_part0.npy
  coarse_path: /system/user/studentwork/wehofer/data/ns/NS_fine_Re100_T128_res128_coarse_k7_part0.npy
  n_train: 200
  n_val: 60
  batch_size: 1
  sub_t: 2
  num_workers: 0

loss:
  re: 100
  t_interval: 1.0
  data_weight: 5.0
  pde_weight: 1.0
  ic_weight: 1.0

opt:
  learning_rate: 0.001
  weight_decay: 0.0
  milestones: [25, 50, 75, 100]
  gamma: 0.5

model:
  data_channels: 5          # gridx, gridy, gridt, IC, coarse_k7
  lifting_channel_ratio: 0
  hidden_channels: 128
