model_arch: unet
data_channels: 4       # gridx, gridy, gridt, IC vorticity (set by prepare_input)
out_channels: 1        # predicted vorticity
base_channels: 64      # encoder widths [64,128,256,512] at depth=3 → ~23.4M params
                       # (param-comparable to FNO n16 h64 arm ~21M)
depth: 3               # spatial downsamples; bottleneck at S/8. S must be divisible by 8.
                       # x,y use circular padding (periodic torus); t zero-padded + never
                       # down/upsampled, mirroring the FNO's temporal_pad asymmetry.
grad_checkpoint: true  # recompute DoubleConv activations in backward; required to fit
                       # base=64 @256²×65 on a 32GB card (~34GB → ~22GB). ~25% slower step.
temporal_mixer: none   # none|spectral|conv|attn — global coupling along t at the bottleneck.
                       # none = baseline. Others fix the long-horizon energy collapse of
                       # local temporal convs; all zero-init residual (identity at start).
temporal_mixer_modes: 16   # spectral: lowest temporal Fourier modes kept (≤ T//2+1)
temporal_mixer_kernel: 31  # conv: depthwise temporal kernel size (odd)
temporal_mixer_heads: 4    # attn: number of attention heads
