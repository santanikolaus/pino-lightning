model_arch: fno
data_channels: 4       # gridx, gridy, gridt, IC vorticity
out_channels: 1        # predicted vorticity
n_modes: [8, 8, 8]     # spectral modes for x, y, t
hidden_channels: 64
n_layers: 4
lifting_channel_ratio: 2
projection_channel_ratio: 2
domain_padding: 0.0     # paper pads only temporal dim; neuralop domain_padding pads ALL
                        # 3 dims (x,y,t) which breaks the periodic BCs of Kolmogorov flow.
                        # paper's temporal padding handled differently (ablation: 1d)
positional_embedding: null  # disable GridEmbeddingND: our prepare_input already injects
                            # [gridx,gridy,gridt,ic] as 4 channels; neuralop's default
                            # 'grid' embedding would append 3 more → 7-ch lifting vs paper's 4
norm: null
fno_skip: linear
implementation: factorized
use_channel_mlp: false   # paper FNO3d has no per-layer MLPs; only final projection
channel_mlp_expansion: 0.5
channel_mlp_dropout: 0.0
separable: false
factorization: null
rank: 1.0
fixed_rank_modes: false
stabilizer: "None"
