model_arch: fno
data_channels: 4       # gridx, gridy, gridt, IC vorticity
out_channels: 1        # predicted vorticity
n_modes: [8, 8, 8]     # spectral modes for x, y, t
hidden_channels: 64
n_layers: 4
lifting_channel_ratio: 2
projection_channel_ratio: 2
domain_padding: 0.0625  # paper Re500-1s-FNO.yaml: num_pad=4; 4/64=0.0625
                        # neuralop strips the padding automatically so output shape always
                        # matches input spatial dims — no manual strip needed in kf_forward.
norm: null
fno_skip: linear
implementation: factorized
use_channel_mlp: true
channel_mlp_expansion: 0.5
channel_mlp_dropout: 0.0
separable: false
factorization: null
rank: 1.0
fixed_rank_modes: false
stabilizer: "None"
