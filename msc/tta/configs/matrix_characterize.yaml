# Characterization matrix (no adaptation) — does the amortization floor rise with Re?
#
# Each cell: frozen operator, its OWN training nu (detector/realistic convention),
# evaluated band-resolved vs GT on a target Re. nu only flavors the residual
# diagnostics; the error metrics (err_k7/early/late/bp_err) are nu-free.
#
# GT validity is asymmetric (pre-registered lock):
#   test_re in {100,200,300} -> GT resolved -> ALL bands valid.
#   test_re == 500           -> GT under-resolved -> read error ONLY k<=7; k>7 is GT-garbage.
#
# Regression check: op300_ood must reproduce 0.2384, op500_ref must reproduce 0.2527.
method: noadapt
out: scripts/outputs/tta_matrix.npz
device: null
cells:
  # ID floors — each operator on its own held-out data ([260:300), n_train+n_val=260)
  - {name: op100_id,  ckpt: pretrain-kol/pvqq97sq/checkpoints/best.ckpt, op_re: 100, test_re: 100}
  - {name: op200_id,  ckpt: pretrain-kol/4em1mfrx/checkpoints/best.ckpt, op_re: 200, test_re: 200}
  - {name: op300_id,  ckpt: pretrain-kol/1iix0n42/checkpoints/best.ckpt, op_re: 300, test_re: 300}
  # OOD — each operator on Re500 (its own nu)
  - {name: op100_ood, ckpt: pretrain-kol/pvqq97sq/checkpoints/best.ckpt, op_re: 100, test_re: 500}
  - {name: op200_ood, ckpt: pretrain-kol/4em1mfrx/checkpoints/best.ckpt, op_re: 200, test_re: 500}
  - {name: op300_ood, ckpt: pretrain-kol/1iix0n42/checkpoints/best.ckpt, op_re: 300, test_re: 500}
  # Re500 reference — supervised-on-target floor
  - {name: op500_ref, ckpt: pretrain-kol/38o0kj3y/checkpoints/best.ckpt, op_re: 500, test_re: 500}
