checkpoints:
  re100:  /system/user/studentwork/wehofer/pino-lightning/pretrain-kol/pvqq97sq/checkpoints/best.ckpt
  re200:  /system/user/studentwork/wehofer/pino-lightning/pretrain-kol/4em1mfrx/checkpoints/best.ckpt
  re300:  /system/user/studentwork/wehofer/pino-lightning/pretrain-kol/1iix0n42/checkpoints/best.ckpt
